max_iterations: 300

llm:
  # Unprefixed model names use this LiteLLM provider. Provider-qualified
  # identifiers such as anthropic/..., gemini/..., or ollama/... override it.
  default_provider: "openai"
  primary_model: "gpt-5.4-mini"
  secondary_model: "gpt-5.5"
  temperature: 0.3
  max_tokens: 6000

prompt:
  system_message: >
    You are designing compact stateful scoring policies for an LLM prefill
    prefix KV-cache. The candidate must expose build_candidate(capacity_blocks,
    block_size_tokens, seed=None) or candidate_factory(...) and return an object
    with score_admission(block, now), score_eviction(block, now), and exactly
    three lifecycle callbacks: on_request_start(request, now),
    on_cache_hit(block, request, now), and on_cache_miss(block, request, now).
    These callbacks must exist but may be no-ops. No other lifecycle callback
    fires. Do not implement on_request_end, on_block_admitted, on_block_evicted,
    or shadow bookkeeping that depends on those unsupported callbacks.

    The simulator owns cache state. Admission happens iff score_admission > 0.
    Eviction chooses the highest score among inactive resident leaves only.
    Higher eviction score means "evict sooner." Active blocks, interior blocks,
    and non-resident blocks cannot be evicted by candidate code.

    PrefixBlockInfo is a frozen per-callback value object, not persistent cache
    state. Use block.prefix_hash (or the equivalent block.block_id) as the
    stable block key. Do not key on id(block), probe guessed attribute names,
    or depend on object identity. Available block fields are: block_id,
    prefix_hash, parent_hash, depth, start_token, end_token, token_count,
    tenant_id, created_at, last_accessed_at, hit_count, descendant_count,
    active_ref_count, estimated_recompute_cost, prev_last_accessed_at,
    last_access_gap, access_gap_mean, access_gap_var, subtree_hit_rate,
    subtree_active_ref_count, estimated_future_reuse, and
    estimated_next_reuse_distance. Recurrence, gap-summary, and subtree fields
    are online summaries of accesses observed at or before the current request.
    The future-reuse fields are None for deployable candidates and only
    populated for oracle/reporting baselines.

    The operative verifier uses 16-token physical cache blocks and 24/48-block
    capacity tiers, equivalent to 384/768 cached tokens. Synthetic traffic is
    generated at a fixed 8-token granularity so cache block-size comparisons
    replay identical token streams. Do not hard-code either size; use the
    supplied block and request fields.

    RequestInfo fields are request_id, tenant_id, session_id, prompt_length,
    priority, request_type, prompt_tokens, predicted_output_length,
    recent_admission_pressure, and recent_miss_rate. request_id is an opaque
    per-trial identifier; request_type is normalized to "request"; and
    prompt_tokens is always empty before callbacks. Do not use request_type or
    prompt_tokens as policy signals. The recent context fields are bounded
    online windows over prior requests; no workload family name is exposed.
    session_id is request-only metadata; PrefixBlockInfo has tenant_id but no
    session_id. The candidate factory receives a fixed policy seed independent
    of workload generation. The now argument is a logical arrival step and may
    repeat for requests in the same microburst. Do not probe guessed block
    attributes.

    Optional composable primitives are available from
    prefix_cache_evolve.problems.prefix_kv_cache.primitives. In particular,
    MultiTimescaleDecay maintains one to eight bounded decayed accumulators per
    key and exposes observe, observe_vector, values, and combine; observe_vector
    applies distinct updates to different channels, and decay_vector is the pure
    stateless counterpart. threshold_excess(value, threshold) is a compact
    stateless positive-hinge helper for thresholded pressure or evidence terms.
    Preserve or simplify canonical primitive state before replacing it with
    bespoke per-key decay dictionaries: canonical calls receive the configured
    bounded form-aware complexity subsidy. Only introduce
    multi-timescale state or regime-conditional control flow when a focused
    mutation cannot express the improvement. Do not hard-code workload-family
    names or use scrubbed request fields.

    Optimize validation token hit rate and block hit rate under shifted,
    bursty mixed workloads while keeping formulas small. Avoid prompt-token
    content overfitting and do not rely on future information. Deliberate
    admission bypass and pin-forced bypass are reported separately; reject
    admissions selectively rather than treating low eviction churn alone as a
    win. Admission waste is token-weighted, and a small concave reward for
    realized admission utility measures saved tokens per admitted cache slot,
    so a hit on a full block is worth more than a hit on a partial block.
    Priority is a deployable request signal, not proof of reuse: recurring
    high-priority prefixes should survive low-priority one-off bursts, while
    high-priority one-off requests should not evict reusable normal traffic.
    Long-horizon tenant workloads repeatedly shift the active tenant, inject
    pollution bursts, and revisit old hot sets after delayed recovery gaps.
    Agentic tool workflows interleave growing routes, fork from shared
    checkpoints, resume paused branches, and replan after rollbacks. Preserve
    reusable trunks and likely-to-resume route state without overprotecting
    abandoned suffixes or one-off tool observations.
    Mutation feedback always includes the non-quarantined
    agentic_tool_workflows surrogate and stochastic_serving_mix target. Treat
    low agentic hit with high underfill and low churn as evidence of
    categorical deep rejection; prefer a narrow recurrence-evidence exception.
    Treat stochastic-mix churn and waste as a pressure-persistence problem
    rather than broadly increasing admission. The agent_trace_branching probe
    remains reporting-only and must not be directly optimized.

    The promoted production parent scores 66.145 on this 16-token verifier,
    ahead of TinyLFU-LRU at 63.548, with effective complexity 372. It is an
    explicit shadow-price dual: one retention index V(block) built from decayed
    frequency, recency, and priority evidence plus descendant count and
    recompute cost; a scalar price calibrated each eviction round toward the
    cheapest eviction candidate; and a fixed switching margin of 0.9 subtracted
    at admission so marginal swaps are refused. Preserve that structure: the
    value-versus-price comparison, the marginal-victim price calibration, and
    an explicit switching barrier. Every coefficient is a provisional first
    guess and a legitimate mutation target: the decay half-lives (12.0, 1.5,
    3.5), the value weights, the price calibration rate (0.5), the
    between-request relaxation (0.97), the pressure floor (0.6), and the margin
    itself. Preserve the charged-score lead, the per-family
    surrogate-to-probe tripwire suite, and the positive hidden-panel margin.

    Do not optimize shadow-price tracking fidelity. On this panel the oracle
    displacement price is usually pinned at zero, so tracking it faster adds
    churn without hit rate; high-fidelity variants of this parent are
    Pareto-dominated. Score follows churn control. The measured weaknesses to
    attack instead are: (1) fairness robustness, where TinyLFU-LRU overtakes
    the parent once the fairness weight grows; a per-tenant price or
    tenant-conditioned margin is the natural mechanism since tenant_id is
    visible on blocks and requests; (2) rolling_template_versions, where the
    parent trails TinyLFU-LRU by about 4.9 because superseded template
    versions retain decayed-frequency value after rollover; last_access_gap
    and access-gap statistics are available staleness signals; (3)
    tenant_phase_shift_cycles, trailing by about 1.6, likely the same
    per-tenant gap; (4) the fixed margin sits on a plateau next to a
    higher, narrow peak, so a margin adapted to observed admission pressure or
    displacement-price movement may capture the peak robustly; and (5) on
    conversation-derived replay, where each turn's prompt extends the previous
    one, the parent's pessimistic cold-start prior anti-transfers badly: a
    first-seen block of an active session has near-certain immediate reuse, so
    a bounded session-aware admission boost (session_id is request-visible) is
    a measured external-transfer fix, though it must not regress the synthetic
    panel that selection actually scores. Charged score on this panel peaks
    near 90-140 evictions per 1,000 requests; treat that churn band as the
    operating region for panel scoring, and treat it as panel-specific rather
    than a universal constant.

    Default to local improvement of the supplied parent. Make exactly one
    semantic change per mutation. Preserve the existing class, imports, and
    state representation unless the mutation deletes or simplifies them. When
    adding per-tenant state, bound it: a small dictionary of scalar prices or
    a tenant-keyed canonical decay is acceptable; unbounded per-key tables of
    tuples are not.
    Production promotion requires effective complexity at or below 650 AST
    nodes. Exploratory proposals may temporarily reach roughly 750 nodes so the
    evaluator can measure their behavior; any proposal above 650 is
    exploration-only and its next mutation must be a dedicated simplification
    pass that preserves measured behavior while deleting at least the reported
    excess. Do not add broad exception handlers, future-reuse references,
    schema fallbacks, unused imports, dynamic execution, introspection, decorators,
    or speculative state. Candidate imports are limited to math and the documented
    primitives module. Keep executable policy code in normal top-level class or
    function definitions; only uppercase literal constants, __all__, and the direct
    candidate_factory alias are valid top-level assignments. Evaluator feedback
    identifies targeted agentic and stochastic guidance plus the parent's weakest
    validation workloads and exact score costs; address one diagnosed weakness
    without regressing cache economics or complexity.
  objectives:
    - "Maximize mean validation workload score while keeping the weakest workload competitive."
    - "Keep p95 deterministic latency and churn low."
    - "Avoid token-weighted admission waste and evictions shortly before reuse."
    - "Protect request-tail and worst-quarter service instead of optimizing only the mean."
    - "Use admission rejection selectively; broad policy bypass must pay for itself in retained hit rate."
    - "Protect recurring high-priority traffic from low-priority scan pollution without hard-coding request types."
    - "Handle irregular agentic forks, resumptions, and replans without overprotecting stale branch suffixes."
    - "Decay observed frequency and priority evidence so stale historical traffic does not remain permanently protected."
    - "Prefer one focused local change; add structure only after a compact mutation is insufficient."
    - "Prefer canonical MultiTimescaleDecay observe_vector state over hand-rolled per-key decay channels."
    - "Use threshold_excess for a thresholded positive hinge; do not build a helper framework around it."
    - "Prefer deletion ablations: keep a score term or state table only when its validation gain justifies its complexity."
    - "Implement only the three lifecycle callbacks that the simulator invokes."
    - "Use simple formulas over the documented PrefixBlockInfo and RequestInfo fields."
    - "Use prefix_hash/block_id for stable per-block state; never use object identity."
    - "Never hard-code workload-family names or use scrubbed request_type/prompt_tokens fields."
    - "Do not inspect hidden workloads; hidden is final reporting only."
    - "Improve on the incumbent's 66.145 charged score without falling below TinyLFU-LRU's 63.548 score or exceeding 650 effective AST nodes."
    - "Preserve the value-versus-price structure with an explicit switching barrier; treat every coefficient as provisional."
    - "Do not chase shadow-price tracking fidelity; keep churn near the 90-140 per-1k operating band."
    - "Reduce the rolling_template_versions and tenant_phase_shift_cycles deficits without regressing the eight winning families."
    - "Improve fairness robustness, for example via bounded per-tenant prices or a tenant-conditioned margin."
    - "Consider a bounded session-aware admission prior for active-session blocks; it must pay for itself on the panel."

evaluator:
  timeout: 90
  cascade_evaluation: false
  parallel_evaluations: 2

init:
  n_diverse_seeds: 4
  n_variants_per_seed: 3
  diversity_llm_kwargs:
    reasoning_effort: medium

cvt:
  n_centroids: 12
  data_driven_centroids: true

behavior:
  ast_features:
    - cyclomatic_complexity
    - subscript_count
  score_keys:
    - validation_token_hit_rate
    - validation_admission_rate
    - validation_policy_underfill_rate
    - validation_cache_churn_per_1k
    - validation_wasted_admission_token_rate
    - validation_avoidable_eviction_rate
    - validation_short_reuse_after_eviction_missed_token_rate
    - validation_shadow_price_tracking_rmse
    - train_workload_agentic_tool_workflows_token_hit_rate
    - train_workload_agentic_tool_workflows_policy_underfill_rate
    - validation_workload_stochastic_serving_mix_token_hit_rate

meta_advice:
  enabled: true
  interval: 24
  max_tokens: 500

pipeline:
  n_llm_workers: 4
  n_parents: 1
  n_inspirations: 0
  output_mode: diff

punctuated_equilibrium:
  enabled: true
  reasoning_effort: medium
  max_tokens: 12000

prompt_overrides:
  paradigm_shift: >
    Produce one compact, deployable paradigm shift from the strongest
    representative. Change one core admission or eviction idea, but preserve
    the representative's small overall architecture and delete or simplify
    existing logic to pay for the change. Target at most 550 effective AST
    nodes. Candidates above 650 nodes are exploration-only and must receive a
    dedicated simplification mutation before promotion. Keep the complete file
    under 120 nonblank lines, with at most one policy class, one bounded state
    dictionary or canonical decay primitive, and a small build_candidate
    factory. Implement exactly
    score_admission, score_eviction, on_request_start, on_cache_hit, and
    on_cache_miss. Use only documented fields and top-level imports. Do not add
    helper frameworks, dataclasses, schema fallbacks, guessed getattr calls,
    broad exception handlers, unsupported callbacks, future-knowledge fields,
    unused imports, or explanatory code. Before output, remove every state
    table, helper, branch, and score term that is not essential to the new
    paradigm.

problem:
  description: >
    Search for adaptive prefix KV-cache scoring heuristics for LLM serving.
  settings:
    verifier_version: "1.0.0"
    capacity_blocks: 24
    capacity_sweep_blocks:
      - 24
      - 48
    block_size_tokens: 16
    workload_token_granularity: 8
    request_count: 96
    seeds:
      - 11
      - 23
      - 37
    policy_seed: 0
    family_request_multipliers:
      tenant_phase_shift_cycles: 3
      tenant_phase_shift_cycles_shifted: 4
    prefill_cost_per_token: 1
    lookup_cost_per_block: 0.035
    eviction_cost_per_block: 0.2
    active_tokens_per_step: 64
    kv_capacity_mode: prefix_only
    latency_norm: 0
    max_memory_bytes: 67108864
    form_aware_complexity: true
    promotion_max_candidate_complexity: 650
    surrogate_probe_tripwire_thresholds:
      agentic_branching: 0.12
      cyclic_working_set: 0.25
    reject_unsupported_source_patterns: true
    train_families:
      - shared_system_prompt
      - rag_template_reuse
      - long_context_mixed
      - session_continuation_growth
      - agentic_tool_workflows
    validation_families:
      - phase_shift_prompts
      - multi_tenant_skew
      - hotset_cold_scan
      - concurrent_long_generation
      - stochastic_serving_mix
      - rolling_template_versions
      - heavy_tailed_prefix_lengths
      - priority_burst_recovery
      - priority_one_off_noise
      - tenant_phase_shift_cycles
    probe_families:
      - agent_trace_branching
      - cyclic_working_set_pressure
    hidden_families:
      - adversarial_unique_prompts
      - cross_family_mixture
      - tenant_session_reentry
      - stochastic_serving_mix_shifted
      - rolling_template_versions_shifted
      - heavy_tailed_prefix_lengths_shifted
      - priority_burst_recovery_shifted
      - cyclic_working_set_pressure_shifted
      - priority_one_off_noise_shifted
      - tenant_phase_shift_cycles_shifted
    scoring:
      w_avg_tok: 80
      w_avg_blk: 60
      min_workload_weight: 0.5
      min_seed_weight: 0.15
      request_tail_weight: 12
      worst_window_weight: 12
      priority_hit_weight: 8
      wasted_admission_weight: 6
      admission_utility_weight: 1
      avoidable_eviction_weight: 8
      latency_weight: 35
      latency_cap: 40
      churn_weight: 0.015
      churn_cap: 25
      underfill_weight: 12
      underfill_cap: 15
      fairness_weight: 80
      fairness_cap: 30
      k_complex: 0.065
      complexity_exponent: 0.75
      v_min: -1000
      invalid_surcharge: 1000

search:
  seed: 20260706
  notes: >
    Candidates should keep the build_candidate(capacity_blocks,
    block_size_tokens, seed=None) entry point and the documented score methods.
    Only on_request_start, on_cache_hit, and on_cache_miss fire as lifecycle
    callbacks. Avoid defensive schema guessing; unknown getattr chains,
    unsupported lifecycle machinery, and id(block) fallbacks are complexity
    with no benchmark value. Treat every score term and state table as
    provisional: try removing terms, and retain them only when their validation
    benefit pays for their complexity. Default to one local semantic change and
    preserve the supplied parent's state representation. The parent is the
    switching-cost shadow-price dual: keep the value-versus-price comparison
    and the marginal-victim price calibration, and mutate coefficients or add
    one bounded mechanism at a time, such as a per-tenant price, a staleness
    depreciation, or an adaptive margin. Do not reward faster price tracking
    for its own sake; on this panel it raises churn without hit rate.
    Candidates above 650 effective nodes are exploratory parents only: use
    their evaluator feedback for a dedicated behavior-preserving simplification
    mutation. Promotion requires a charged combined score above the 66.145
    incumbent, no invalid groups, effective complexity at or below 650, and
    subsequent probe and hidden non-regression review.
