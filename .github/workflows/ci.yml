name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev --extra evolution

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check evaluators
        run: uv run mypy

      - name: Verify discovery workload manifest
        run: >-
          uv run prefix-cache-evolve
          --workload-manifest
          --workload-manifest-output /tmp/discovery_workload_manifest.json
          --workload-manifest-reference docs/results/discovery_workload_manifest.json
          --config configs/prefix_kv_cache_discovery.yaml

      - name: Verify incumbent registry
        run: uv run prefix-cache-tools incumbents validate

      - name: Test
        run: uv run pytest -q
