max_iterations: 300

llm:
  default_provider: "openai"
  primary_model: "gpt-5.4-mini"
  secondary_model: "gpt-5.5"
  temperature: 0.3
  max_tokens: 6000

prompt:
  system_message: >
    Design a compact online admission and eviction policy for an LLM prefill
    prefix KV-cache. The supplied parent is deliberately weak and is not a
    template for the desired solution. The candidate must expose
    build_candidate(capacity_blocks, block_size_tokens, seed=None) or
    candidate_factory(...) and return an object with score_admission(block,
    now), score_eviction(block, now), and exactly three lifecycle callbacks:
    on_request_start(request, now), on_cache_hit(block, request, now), and
    on_cache_miss(block, request, now). These callbacks must exist but may be
    no-ops. No other lifecycle callback fires.

    The simulator owns cache state. Admission happens iff score_admission > 0.
    Eviction chooses the highest score among inactive resident leaves only.
    PrefixBlockInfo is a frozen per-callback value object. Use
    block.prefix_hash or block.block_id as a stable key, never object identity.

    Available PrefixBlockInfo fields are block_id, prefix_hash, parent_hash,
    depth, start_token, end_token, token_count, tenant_id, created_at,
    last_accessed_at, hit_count, descendant_count, active_ref_count,
    estimated_recompute_cost, prev_last_accessed_at, last_access_gap,
    access_gap_mean, access_gap_var, subtree_hit_rate,
    subtree_active_ref_count, estimated_future_reuse, and
    estimated_next_reuse_distance. Future-reuse fields are unavailable to
    deployable candidates. Available RequestInfo fields are request_id,
    tenant_id, session_id, prompt_length, priority, request_type, prompt_tokens,
    predicted_output_length, recent_admission_pressure, and recent_miss_rate.
    request_id is opaque, request_type is normalized, and prompt_tokens is
    empty. Never use request_type or prompt_tokens as policy signals, and never
    access a block or request field that is not enumerated above. Use only
    online information available at the current callback.

    Optional generic building blocks are available from
    prefix_cache_evolve.problems.prefix_kv_cache.primitives.
    MultiTimescaleDecay maintains a bounded per-key vector of exponentially
    decayed online observations and exposes observe, observe_vector, values,
    and combine. decay_vector is its stateless counterpart.
    threshold_excess(value, threshold) is a positive hinge. These primitives
    are available search-space tools, not required architecture; use them only
    when measured feedback justifies bounded state or thresholding.

    The verifier contains shifted, bursty, mixed, long-horizon, and branching
    workloads at multiple capacities. Optimize generalization, request-tail
    service, realized admission utility, and hit rate while controlling churn,
    underfill, wasted admissions, avoidable evictions, fairness penalties, and
    source complexity. Search ranks candidates by the lower of the ordinary
    validation score and a non-quarantined agentic-workflow guidance score, so
    improve the measured bottleneck instead of trading one workload class
    against the other. Do not hard-code workload-family names, capacities,
    block sizes, request identifiers, or scrubbed fields.

    Explore any compact deployable algorithm justified by evaluator feedback.
    Do not assume the supplied parent's architecture, state representation, or
    formulas should survive. Production promotion requires effective
    complexity at or below 650 AST nodes. Proposals above 650 are
    exploration-only and must be simplified before promotion. Candidate imports
    are limited to math and the documented primitives module. Do not add broad
    exception handlers, dynamic execution, introspection, future-reuse
    references, guessed schema fallbacks, unsupported callbacks, decorators,
    unused imports, or speculative machinery.
  objectives:
    - "Improve charged validation score and the weakest workload from the supplied weak seed."
    - "Control admission waste, churn, underfill, avoidable eviction, and request-tail cost."
    - "Use only deployable online signals and the three supported lifecycle callbacks."
    - "Keep only state, score terms, and branches whose measured benefit justifies their complexity."
    - "Do not inspect hidden or reporting-only probe workloads during search."
    - "Produce a complete policy at or below 650 effective AST nodes."

evaluator:
  timeout: 90
  cascade_evaluation: false
  parallel_evaluations: 2

init:
  n_diverse_seeds: 6
  n_variants_per_seed: 2
  diversity_model: "openai/gpt-5.4-mini"

cvt:
  n_centroids: 16
  data_driven_centroids: true

behavior:
  ast_features:
    - cyclomatic_complexity
    - subscript_count
  score_keys:
    - validation_token_hit_rate
    - validation_admission_rate
    - validation_policy_underfill_rate
    - validation_cache_churn_per_1k
    - validation_wasted_admission_token_rate
    - validation_avoidable_eviction_rate
    - validation_short_reuse_after_eviction_missed_token_rate
    - validation_shadow_price_tracking_rmse
    - search_guidance_floor_score
    - train_workload_agentic_tool_workflows_token_hit_rate
    - train_workload_agentic_tool_workflows_policy_underfill_rate
    - validation_workload_stochastic_serving_mix_token_hit_rate

meta_advice:
  enabled: true
  interval: 24
  max_tokens: 500

pipeline:
  n_llm_workers: 4
  n_parents: 1
  n_inspirations: 2
  output_mode: diff

punctuated_equilibrium:
  enabled: true
  reasoning_effort: medium
  max_tokens: 12000

prompt_overrides:
  paradigm_shift: >
    Produce one compact, deployable alternative policy architecture. The
    supplied seed is deliberately weak, so replace its central idea when a
    different online algorithm is better supported by evaluator feedback.
    Target at most 550 effective AST nodes and keep the complete policy below
    650 nodes for promotion. Implement only the required factory, score
    methods, and three supported callbacks. Use documented fields and
    top-level imports. Remove every state table, helper, branch, and score term
    that is not essential to the proposed algorithm.

problem:
  description: >
    Independently discover a deployable prefix KV-cache policy from a weak seed
    without guidance from the retained incumbent.
  settings:
    verifier_version: "1.0.0"
    capacity_blocks: 24
    capacity_sweep_blocks:
      - 24
      - 48
    block_size_tokens: 16
    workload_token_granularity: 8
    request_count: 96
    seeds:
      - 11
      - 23
      - 37
    policy_seed: 0
    family_request_multipliers:
      tenant_phase_shift_cycles: 3
      tenant_phase_shift_cycles_shifted: 4
    prefill_cost_per_token: 1
    lookup_cost_per_block: 0.035
    eviction_cost_per_block: 0.2
    active_tokens_per_step: 64
    kv_capacity_mode: prefix_only
    latency_norm: 0
    max_memory_bytes: 67108864
    form_aware_complexity: true
    promotion_max_candidate_complexity: 650
    search_score_mode: robust_min
    search_guidance_families:
      - agentic_tool_workflows
    surrogate_probe_tripwire_thresholds:
      agentic_branching: 0.12
      cyclic_working_set: 0.25
    reject_unsupported_source_patterns: true
    train_families:
      - shared_system_prompt
      - rag_template_reuse
      - long_context_mixed
      - session_continuation_growth
      - agentic_tool_workflows
    validation_families:
      - phase_shift_prompts
      - multi_tenant_skew
      - hotset_cold_scan
      - concurrent_long_generation
      - stochastic_serving_mix
      - rolling_template_versions
      - heavy_tailed_prefix_lengths
      - priority_burst_recovery
      - priority_one_off_noise
      - tenant_phase_shift_cycles
    probe_families:
      - agent_trace_branching
      - cyclic_working_set_pressure
    hidden_families:
      - adversarial_unique_prompts
      - cross_family_mixture
      - tenant_session_reentry
      - stochastic_serving_mix_shifted
      - rolling_template_versions_shifted
      - heavy_tailed_prefix_lengths_shifted
      - priority_burst_recovery_shifted
      - cyclic_working_set_pressure_shifted
      - priority_one_off_noise_shifted
      - tenant_phase_shift_cycles_shifted
    scoring:
      w_avg_tok: 80
      w_avg_blk: 60
      min_workload_weight: 0.5
      min_seed_weight: 0.15
      request_tail_weight: 12
      worst_window_weight: 12
      priority_hit_weight: 8
      wasted_admission_weight: 6
      admission_utility_weight: 1
      avoidable_eviction_weight: 8
      latency_weight: 35
      latency_cap: 40
      churn_weight: 0.015
      churn_cap: 25
      underfill_weight: 12
      underfill_cap: 15
      fairness_weight: 80
      fairness_cap: 30
      k_complex: 0.065
      complexity_exponent: 0.75
      v_min: -1000
      invalid_surcharge: 1000

search:
  seed: 20260609
  notes: >
    The seed is an experimental starting condition, not an incumbent to
    preserve. Search may replace its class, formulas, and state representation.
    Treat every score term and state table as provisional. Candidates above 650
    effective nodes are exploratory only; promotion requires a valid complete
    policy at or below 650 nodes. Probe and hidden panels are reserved for
    post-search rediscovery adjudication. Candidate selection uses the robust
    minimum of ordinary validation and the non-quarantined agentic surrogate.
