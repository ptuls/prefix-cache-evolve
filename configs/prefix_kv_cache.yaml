max_iterations: 300

llm:
  primary_model: "gpt-5.4-mini"
  temperature: 1.0
  max_tokens: 12000

prompt:
  system_message: >
    You are designing simple stateless scoring policies for an LLM prefill
    prefix KV-cache. The candidate must expose build_candidate(capacity_blocks,
    block_size_tokens, seed=None) or candidate_factory(...) and return an object
    with score_admission(block, now), score_eviction(block, now), and exactly
    three lifecycle callbacks: on_request_start(request, now),
    on_cache_hit(block, request, now), and on_cache_miss(block, request, now).
    These callbacks must exist but may be no-ops. No other lifecycle callback
    fires. Do not implement on_request_end, on_block_admitted, on_block_evicted,
    or shadow bookkeeping that depends on those unsupported callbacks.

    The simulator owns cache state. Admission happens iff score_admission > 0.
    Eviction chooses the highest score among inactive resident leaves only.
    Higher eviction score means "evict sooner." Active blocks, interior blocks,
    and non-resident blocks cannot be evicted by candidate code.

    PrefixBlockInfo is a frozen per-callback value object, not persistent cache
    state. Use block.prefix_hash (or the equivalent block.block_id) as the
    stable block key. Do not key on id(block), probe guessed attribute names,
    or depend on object identity. Available block fields are: block_id,
    prefix_hash, parent_hash, depth, start_token, end_token, token_count,
    tenant_id, created_at, last_accessed_at, hit_count, descendant_count,
    active_ref_count, estimated_recompute_cost, prev_last_accessed_at,
    last_access_gap, access_gap_mean, access_gap_var, subtree_hit_rate,
    subtree_active_ref_count, estimated_future_reuse, and
    estimated_next_reuse_distance. Recurrence, gap-summary, and subtree fields
    are online summaries of accesses observed at or before the current request.
    The future-reuse fields are None for deployable candidates and only
    populated for oracle/reporting baselines.

    RequestInfo fields are request_id, tenant_id, session_id, prompt_length,
    priority, request_type, prompt_tokens, predicted_output_length,
    recent_admission_pressure, and recent_miss_rate. The recent context fields
    are bounded online windows over prior requests; no workload family name is
    exposed. session_id is request-only metadata; PrefixBlockInfo has tenant_id
    but no session_id. The now argument is a logical arrival step and may repeat
    for requests in the same microburst. Do not probe guessed block attributes.

    Optional composable primitives are available from
    prefix_cache_evolve.problems.prefix_kv_cache.primitives. In particular,
    MultiTimescaleDecay maintains one to eight bounded decayed accumulators per
    key and exposes observe, observe_vector, values, and combine; observe_vector
    applies distinct updates to different channels, and decay_vector is the pure
    stateless counterpart. Preserve or simplify canonical primitive state before
    replacing it with bespoke per-key decay dictionaries: canonical calls receive
    the configured bounded form-aware complexity subsidy. Explore multi-timescale
    recurrence estimates and regime-conditional admission or eviction control
    flow. Do not hard-code workload-family names or request_type values.

    Optimize validation token hit rate and block hit rate under shifted,
    bursty mixed workloads while keeping formulas small. Avoid prompt-token
    content overfitting and do not rely on future information. Deliberate
    admission bypass and pin-forced bypass are reported separately; reject
    admissions selectively rather than treating low eviction churn alone as a
    win. Admission waste is token-weighted, and a small concave reward for
    realized admission utility measures saved tokens per admitted cache slot,
    so a hit on a full block is worth more than a hit on a partial block.
    Priority is a deployable request signal, not proof of reuse: recurring
    high-priority prefixes should survive low-priority one-off bursts, while
    high-priority one-off requests should not evict reusable normal traffic.
    Long-horizon tenant workloads repeatedly shift the active tenant, inject
    pollution bursts, and revisit old hot sets after delayed recovery gaps.
  objectives:
    - "Maximize mean validation workload score while keeping the weakest workload competitive."
    - "Keep p95 deterministic latency and churn low."
    - "Avoid token-weighted admission waste and evictions shortly before reuse."
    - "Protect request-tail and worst-quarter service instead of optimizing only the mean."
    - "Use admission rejection selectively; broad policy bypass must pay for itself in retained hit rate."
    - "Protect recurring high-priority traffic from low-priority scan pollution without hard-coding request types."
    - "Decay observed frequency and priority evidence so stale historical traffic does not remain permanently protected."
    - "Try multi-timescale and regime-conditional structure when a single monotone score cannot represent recurrence."
    - "Prefer canonical MultiTimescaleDecay observe_vector state over hand-rolled per-key decay channels."
    - "Prefer deletion ablations: keep a score term or state table only when its validation gain justifies its complexity."
    - "Implement only the three lifecycle callbacks that the simulator invokes."
    - "Use simple formulas over the documented PrefixBlockInfo and RequestInfo fields."
    - "Use prefix_hash/block_id for stable per-block state; never use object identity."
    - "Never hard-code workload-family names or request_type values."
    - "Do not inspect hidden workloads; hidden is final reporting only."

evaluator:
  timeout: 90
  cascade_evaluation: false
  parallel_evaluations: 2

init:
  n_diverse_seeds: 0
  n_variants_per_seed: 8

cvt:
  n_centroids: 8
  data_driven_centroids: true

behavior:
  ast_features:
    - code_length
    - cyclomatic_complexity
    - branch_count
    - math_operators
  score_keys:
    - validation_token_hit_rate
    - validation_cache_churn_per_1k
    - validation_wasted_admission_token_rate

meta_advice:
  enabled: true
  interval: 24
  max_tokens: 500

pipeline:
  n_llm_workers: 4
  n_parents: 1
  n_inspirations: 1
  output_mode: diff

punctuated_equilibrium:
  enabled: false

problem:
  description: >
    Search for adaptive prefix KV-cache scoring heuristics for LLM serving.
  settings:
    capacity_blocks: 24
    capacity_sweep_blocks:
      - 24
      - 48
    block_size_tokens: 8
    request_count: 96
    seeds:
      - 11
      - 23
      - 37
    family_request_multipliers:
      tenant_phase_shift_cycles: 3
      tenant_phase_shift_cycles_shifted: 4
    prefill_cost_per_token: 1
    lookup_cost_per_block: 0.035
    eviction_cost_per_block: 0.2
    active_tokens_per_step: 64
    latency_norm: 0
    max_memory_bytes: 67108864
    form_aware_complexity: true
    train_families:
      - shared_system_prompt
      - rag_template_reuse
      - long_context_mixed
      - session_continuation_growth
    validation_families:
      - phase_shift_prompts
      - multi_tenant_skew
      - hotset_cold_scan
      - concurrent_long_generation
      - stochastic_serving_mix
      - rolling_template_versions
      - heavy_tailed_prefix_lengths
      - priority_burst_recovery
      - priority_one_off_noise
      - tenant_phase_shift_cycles
    probe_families:
      - agent_trace_branching
      - cyclic_working_set_pressure
    hidden_families:
      - adversarial_unique_prompts
      - cross_family_mixture
      - tenant_session_reentry
      - stochastic_serving_mix_shifted
      - rolling_template_versions_shifted
      - heavy_tailed_prefix_lengths_shifted
      - priority_burst_recovery_shifted
      - cyclic_working_set_pressure_shifted
      - priority_one_off_noise_shifted
      - tenant_phase_shift_cycles_shifted
    scoring:
      w_avg_tok: 80
      w_avg_blk: 60
      min_workload_weight: 0.5
      min_seed_weight: 0.15
      request_tail_weight: 12
      worst_window_weight: 12
      priority_hit_weight: 8
      wasted_admission_weight: 6
      admission_utility_weight: 1
      avoidable_eviction_weight: 8
      latency_weight: 35
      latency_cap: 40
      churn_weight: 0.015
      churn_cap: 25
      fairness_weight: 80
      fairness_cap: 30
      k_complex: 0.065
      complexity_exponent: 0.75
      v_min: -1000
      invalid_surcharge: 1000

search:
  notes: >
    Candidates should keep the build_candidate(capacity_blocks,
    block_size_tokens, seed=None) entry point and the documented score methods.
    Only on_request_start, on_cache_hit, and on_cache_miss fire as lifecycle
    callbacks. Avoid defensive schema guessing; unknown getattr chains,
    unsupported lifecycle machinery, and id(block) fallbacks are complexity
    with no benchmark value. Treat every score term and state table as
    provisional: try removing terms, and retain them only when their validation
    benefit pays for their complexity. The supplied structured seed already uses
    bounded canonical vector-decay state; mutate or ablate that representation
    before introducing a custom state dictionary.
